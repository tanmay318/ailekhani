# netlify.toml — AI Lekhani (ailekhani.com)
# Place this at the ROOT of your project folder

[build]
  publish = "."
  functions = "netlify/functions"

# ── API routes → Netlify functions ──────────────────
[[redirects]]
  from   = "/api/auth/*"
  to     = "/.netlify/functions/auth/:splat"
  status = 200

[[redirects]]
  from   = "/api/verify-payment"
  to     = "/.netlify/functions/verify-payment"
  status = 200

[[redirects]]
  from   = "/api/create-order"
  to     = "/.netlify/functions/create-order"
  status = 200

# ── www redirect → apex ─────────────────────────────
[[redirects]]
  from   = "https://www.ailekhani.com/*"
  to     = "https://ailekhani.com/:splat"
  status = 301
  force  = true

# ── .in redirect → .com ─────────────────────────────
[[redirects]]
  from   = "https://ailekhani.in/*"
  to     = "https://ailekhani.com/:splat"
  status = 301
  force  = true

# ── Security headers ─────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Only allow connections to these specific external domains
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://checkout.razorpay.com https://fonts.googleapis.com https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://api.anthropic.com https://api.openai.com https://generativelanguage.googleapis.com https://api.razorpay.com https://oauth2.googleapis.com https://www.googleapis.com https://ipapi.co; frame-src https://api.razorpay.com https://accounts.google.com; img-src 'self' data: https://lh3.googleusercontent.com; object-src 'none'; base-uri 'self';"
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains; preload"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(self), geolocation=(), payment=(self)"

# ── Cache static assets ──────────────────────────────
[[headers]]
  for = "/app/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "no-cache"
